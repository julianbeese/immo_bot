<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ImmoBot Dashboard</title>
<style>
  :root { --bg:#0f1115; --card:#1a1d24; --line:#2a2e38; --fg:#e6e8ec; --muted:#9aa0aa; --accent:#4f8cff; --green:#3fb950; --amber:#d29922; --red:#f85149; }
  * { box-sizing:border-box; }
  body { margin:0; font:14px/1.5 system-ui,-apple-system,Segoe UI,Roboto,sans-serif; background:var(--bg); color:var(--fg); }
  header { padding:16px 20px; border-bottom:1px solid var(--line); display:flex; flex-wrap:wrap; gap:16px; align-items:center; }
  h1 { font-size:18px; margin:0; margin-right:auto; }
  main { padding:20px; max-width:1100px; margin:0 auto; display:grid; gap:20px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:10px; padding:16px; }
  .card h2 { font-size:13px; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); margin:0 0 12px; }
  .row { display:flex; flex-wrap:wrap; gap:10px; align-items:center; }
  .stats { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
  .stat { background:var(--card); border:1px solid var(--line); border-radius:10px; padding:14px; text-align:center; }
  .stat b { display:block; font-size:26px; }
  .stat span { color:var(--muted); font-size:12px; }
  button { background:var(--line); color:var(--fg); border:1px solid var(--line); border-radius:7px; padding:6px 12px; cursor:pointer; font-size:13px; }
  button:hover { border-color:var(--accent); }
  button.active { background:var(--accent); border-color:var(--accent); color:#fff; }
  button.danger:hover { border-color:var(--red); color:var(--red); }
  input, select { background:var(--bg); color:var(--fg); border:1px solid var(--line); border-radius:7px; padding:6px 9px; font-size:13px; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th, td { text-align:left; padding:8px 10px; border-bottom:1px solid var(--line); vertical-align:top; }
  th { color:var(--muted); font-weight:600; font-size:11px; text-transform:uppercase; }
  a { color:var(--accent); text-decoration:none; }
  .badge { display:inline-block; padding:1px 8px; border-radius:99px; font-size:11px; border:1px solid var(--line); color:var(--muted); }
  .badge.on { color:var(--green); border-color:var(--green); }
  .badge.amber { color:var(--amber); border-color:var(--amber); }
  .muted { color:var(--muted); }
  .pill { font-size:12px; padding:3px 10px; border-radius:99px; border:1px solid var(--line); }
</style>
</head>
<body>
<header>
  <h1>🏠 ImmoBot</h1>
  <span id="status" class="pill muted">lädt…</span>
  <span id="lastpoll" class="pill muted"></span>
</header>
<main>
  <div class="card">
    <h2>Einstellungen</h2>
    <div class="row">
      <span class="muted">Kontakt:</span>
      <button data-mode="off">⏸ Aus</button>
      <button data-mode="test">🧪 Test</button>
      <button data-mode="on">✅ Live</button>
      <span style="width:20px"></span>
      <span class="muted">Ruhezeiten:</span>
      <button id="quiet">…</button>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><b id="s-total">–</b><span>Gefunden</span></div>
    <div class="stat"><b id="s-notified">–</b><span>Benachrichtigt</span></div>
    <div class="stat"><b id="s-contacted">–</b><span>Kontaktiert</span></div>
  </div>

  <div class="card">
    <h2>Suchprofile</h2>
    <div class="row" style="margin-bottom:12px">
      <input id="p-url" placeholder="IS24-Such-URL" style="flex:1;min-width:240px">
      <select id="p-campaign"></select>
      <input id="p-name" placeholder="Name (optional)">
      <button id="p-add" class="active">+ Anlegen</button>
    </div>
    <table><thead><tr><th>ID</th><th>Name</th><th>Kampagne</th><th>URL</th><th>Status</th><th></th></tr></thead>
    <tbody id="profiles"></tbody></table>
  </div>

  <div class="card">
    <h2>Wohnungen</h2>
    <table><thead><tr><th>Datum</th><th>Titel</th><th>Preis</th><th>Zi/m²</th><th>Kampagne</th><th>Status</th></tr></thead>
    <tbody id="listings"></tbody></table>
  </div>
</main>

<script>
const $ = s => document.querySelector(s);
const esc = s => (s||"").replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
let state = {};

async function api(path, opts) {
  const r = await fetch(path, opts);
  if (!r.ok) { const e = await r.json().catch(()=>({error:r.statusText})); throw new Error(e.error||r.statusText); }
  return r.status === 204 ? null : r.json();
}

async function loadOverview() {
  const o = await api('/api/overview'); state = o;
  $('#status').textContent = o.contact_label + (o.quiet_hours ? ' · 🌙 Ruhezeiten' : ' · ☀️ 24/7');
  $('#lastpoll').textContent = o.last_poll ? 'letzter Poll: ' + new Date(o.last_poll).toLocaleString('de-DE') : 'noch kein Poll';
  document.querySelectorAll('[data-mode]').forEach(b => b.classList.toggle('active', b.dataset.mode === o.contact_mode));
  $('#quiet').textContent = o.quiet_hours ? '🌙 An' : '☀️ Aus';
  $('#quiet').classList.toggle('active', o.quiet_hours);
  $('#s-total').textContent = o.stats.total;
  $('#s-notified').textContent = o.stats.notified;
  $('#s-contacted').textContent = o.stats.contacted;
  const sel = $('#p-campaign');
  if (sel.options.length !== o.campaigns.length) {
    sel.innerHTML = o.campaigns.map(c => `<option ${c===o.default_campaign?'selected':''}>${esc(c)}</option>`).join('');
  }
}

async function loadProfiles() {
  const ps = await api('/api/profiles');
  $('#profiles').innerHTML = (ps||[]).map(p => `
    <tr>
      <td>${p.id}</td>
      <td>${esc(p.name)}</td>
      <td>${esc(p.category || state.default_campaign || '')}</td>
      <td>${p.search_url ? `<a href="${esc(p.search_url)}" target="_blank">Link</a>` : esc(p.city||'')}</td>
      <td><span class="badge ${p.active?'on':''}">${p.active?'aktiv':'aus'}</span></td>
      <td class="row">
        <button onclick="toggleProfile(${p.id}, ${!p.active})">${p.active?'Pause':'Aktiv'}</button>
        <button class="danger" onclick="delProfile(${p.id})">Löschen</button>
      </td>
    </tr>`).join('') || '<tr><td colspan="6" class="muted">Keine Profile. Oben anlegen.</td></tr>';
}

async function loadListings() {
  const ls = await api('/api/listings?limit=100');
  $('#listings').innerHTML = (ls||[]).map(l => `
    <tr>
      <td class="muted">${new Date(l.created_at).toLocaleDateString('de-DE')}</td>
      <td><a href="${esc(l.url)}" target="_blank">${esc(l.title)}</a><br><span class="muted">${esc(l.address||l.city||'')}</span></td>
      <td>${l.price?l.price+' €':'–'}</td>
      <td>${l.rooms||'–'} / ${l.area||'–'}</td>
      <td>${esc(l.campaign||'')}</td>
      <td>
        ${l.notified?'<span class="badge amber">benachrichtigt</span> ':''}
        ${l.contacted?'<span class="badge on">kontaktiert</span>':''}
      </td>
    </tr>`).join('') || '<tr><td colspan="6" class="muted">Noch keine Wohnungen.</td></tr>';
}

async function setSetting(body) {
  try { await api('/api/settings', {method:'POST', body:JSON.stringify(body)}); await loadOverview(); }
  catch(e) { alert(e.message); }
}
async function toggleProfile(id, active) {
  try { await api(`/api/profiles/${id}/active`, {method:'POST', body:JSON.stringify({active})}); await loadProfiles(); }
  catch(e) { alert(e.message); }
}
async function delProfile(id) {
  if (!confirm('Profil '+id+' löschen?')) return;
  try { await api(`/api/profiles/${id}`, {method:'DELETE'}); await loadProfiles(); }
  catch(e) { alert(e.message); }
}

document.querySelectorAll('[data-mode]').forEach(b => b.onclick = () => setSetting({contact_mode:b.dataset.mode}));
$('#quiet').onclick = () => setSetting({quiet_hours: !state.quiet_hours});
$('#p-add').onclick = async () => {
  const url = $('#p-url').value.trim();
  if (!url) return alert('URL fehlt');
  try {
    await api('/api/profiles', {method:'POST', body:JSON.stringify({url, category:$('#p-campaign').value, name:$('#p-name').value})});
    $('#p-url').value = ''; $('#p-name').value = '';
    await loadProfiles();
  } catch(e) { alert(e.message); }
};

async function refresh() {
  try { await loadOverview(); await loadProfiles(); await loadListings(); }
  catch(e) { $('#status').textContent = 'Fehler: ' + e.message; }
}
refresh();
setInterval(refresh, 10000);
</script>
</body>
</html>
