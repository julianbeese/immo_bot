services:
  immobot:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
    container_name: immobot
    restart: unless-stopped

    # Resource limits — Chrome scrape peaks ~400 MiB; bumped to 1 GiB to keep
    # headroom for OpenAI calls + the daily backup vacuum running in parallel.
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
        reservations:
          cpus: '0.5'
          memory: 512M

    # Shared memory for Chrome
    shm_size: 256mb

    # Explicit DNS — the host runs systemd-resolved on 127.0.0.53, which is
    # not reachable from the container's network namespace. Without this,
    # Go's resolver inherits a broken resolv.conf and every DNS lookup fails
    # (api.telegram.org, openai.com, IS24, etc.).
    dns:
      - 1.1.1.1
      - 8.8.8.8

    # Web dashboard — published to host loopback only.
    # On the host/VM: http://127.0.0.1:8080 (tunnel from your laptop via
    # ssh -L 8080:localhost:8080 user@vm). Requires WEB_ENABLED=true.
    ports:
      - "127.0.0.1:8080:8080"

    # Volumes
    volumes:
      - ../configs:/app/configs:ro
      - immobot_data:/app/data

    # Environment variables (secrets)
    environment:
      - TZ=Europe/Berlin
      - LOG_LEVEL=info
      - DEBUG_HTML=1
      # Set these via .env file or override
      - TELEGRAM_ENABLED=${TELEGRAM_ENABLED:-false}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - OPENAI_ENABLED=${OPENAI_ENABLED:-false}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - WHATSAPP_ENABLED=${WHATSAPP_ENABLED:-false}
      - WHATSAPP_TARGET_PHONE=${WHATSAPP_TARGET_PHONE:-}
      # Web dashboard: bind 0.0.0.0 inside the container so the published
      # 127.0.0.1:8080 host port can reach it.
      - WEB_ENABLED=${WEB_ENABLED:-false}
      - WEB_ADDR=${WEB_ADDR:-0.0.0.0:8080}
      - IS24_COOKIE=${IS24_COOKIE:-}
      - IS24_PROXY_URL=${IS24_PROXY_URL:-}
      - IS24_PROXY_USER=${IS24_PROXY_USER:-}
      - IS24_PROXY_PASS=${IS24_PROXY_PASS:-}
      - IS24_PROXY_BANDWIDTH_CAP_MB=${IS24_PROXY_BANDWIDTH_CAP_MB:-0}
      - CONTACT_ENABLED=${CONTACT_ENABLED:-false}
      - CONTACT_SALUTATION=${CONTACT_SALUTATION:-}
      - CONTACT_FIRST_NAME=${CONTACT_FIRST_NAME:-}
      - CONTACT_LAST_NAME=${CONTACT_LAST_NAME:-}
      - CONTACT_EMAIL=${CONTACT_EMAIL:-}
      - CONTACT_PHONE=${CONTACT_PHONE:-}
      - CONTACT_STREET=${CONTACT_STREET:-}
      - CONTACT_HOUSE_NUMBER=${CONTACT_HOUSE_NUMBER:-}
      - CONTACT_POSTAL_CODE=${CONTACT_POSTAL_CODE:-}
      - CONTACT_CITY=${CONTACT_CITY:-}
      - CONTACT_ADULTS=${CONTACT_ADULTS:-}
      - CONTACT_CHILDREN=${CONTACT_CHILDREN:-}
      - CONTACT_PETS=${CONTACT_PETS:-}
      - CONTACT_INCOME=${CONTACT_INCOME:-}
      - CONTACT_MOVE_IN_DATE=${CONTACT_MOVE_IN_DATE:-}
      - CONTACT_EMPLOYMENT=${CONTACT_EMPLOYMENT:-}
      - CONTACT_RENT_ARREARS=${CONTACT_RENT_ARREARS:-}
      - CONTACT_INSOLVENCY=${CONTACT_INSOLVENCY:-}
      - CONTACT_SMOKER=${CONTACT_SMOKER:-}
      - CONTACT_COMMERCIAL_USE=${CONTACT_COMMERCIAL_USE:-}
      - EMAIL_ENABLED=${EMAIL_ENABLED:-false}
      - EMAIL_IMAP_HOST=${EMAIL_IMAP_HOST:-}
      - EMAIL_USERNAME=${EMAIL_USERNAME:-}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD:-}
      - EMAIL_MAILBOX=${EMAIL_MAILBOX:-INBOX}
      - BACKUP_ENABLED=${BACKUP_ENABLED:-true}
      - BACKUP_INTERVAL=${BACKUP_INTERVAL:-24h}
      - BACKUP_RETENTION_DAYS=${BACKUP_RETENTION_DAYS:-7}
      - BACKUP_DIR=${BACKUP_DIR:-data/backups}

    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  immobot_data:
    driver: local
